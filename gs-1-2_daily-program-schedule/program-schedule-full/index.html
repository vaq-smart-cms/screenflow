<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    id="viewport-meta"
    name="viewport"
    content="width=1920, initial-scale=0.6667, minimum-scale=0.6667, maximum-scale=0.6667, user-scalable=no"
  />

  <script>
    (function setResponsiveViewport() {
      const isLikelyMobile =
        window.matchMedia('(pointer: coarse)').matches &&
        window.screen.width <= 900;

      if (!isLikelyMobile) return;

      document.documentElement.classList.add('is-mobile-view');

      const viewportMeta = document.getElementById('viewport-meta');

      if (viewportMeta) {
        viewportMeta.setAttribute(
          'content',
          'width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes'
        );
      }
    })();
  </script>

  <title>VAQ Program Schedule Full</title>
  <link rel="stylesheet" href="./index.css?v=1" />

</head>

<!--
  Target container: 1920 x 810 px
  Scale fix applied for Kuusoft environment rendering oversized.
  Shared asset path note:
  This page uses the repo-level ../assets/ folder for common fonts and imagery.
  Update these paths if the hosted folder structure changes later.
-->

<body>
  <main class="page">
    <div class="bg-rotator" aria-hidden="true"></div>

    <div class="content-layer">
      <div id="status-panel" class="status-panel" hidden></div>

      <section id="mobile-schedule" class="mobile-schedule" hidden>
        <header class="mobile-schedule-header">
          <p class="mobile-kicker">Today at Vancouver Aquarium</p>

          <h1 class="mobile-title">Program Schedule</h1>

          <h2 id="mobile-datetime" class="mobile-datetime">
            Monday, April 13 • 2:47 p.m.
          </h2>
        </header>

        <div id="mobile-program-list" class="mobile-program-list"></div>
      </section>

      <div id="grid" class="grid" hidden></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://csxuuwbtxgdpvskggcux.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_jPeweysUr7DZvFxG7F1-LQ_UR8MT1F9';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const PAGE_SIZE = 10;
    const LEFT_COLUMN_COUNT = 5;
    const TIMEZONE_NAME = 'America/Vancouver';
    const TILE_OPACITY = 0.80;

    const META_HOLD_MS = 4000;
    const DESC_HOLD_MS = 4000;

    const TRANSITION_DURATION_MS = 520;
    const BOUNDARY_FUDGE_MS = 250;

    const PUBLIC_NO_SCHEDULE_MESSAGE = "Stay tuned! We're still setting up today’s schedule... 🐟";
    const MOBILE_NO_SCHEDULE_MESSAGE = "You otter' build the schedule for today! 🦦⌚";
    const LOAD_ERROR_MESSAGE = 'Program schedule could not be loaded right now.';

    const LAYOUT = {
      leftX: 0,
      rightX: 950,
      startY: 0,
      rowStep: 156
    };

    const state = {
      locationStyles: [],
      liveSchedule: null,
      allEntries: [],
      visibleEntries: [],
      tileElementsById: new Map(),
      transitionTimerId: null,
      lineTimerIds: []
    };

    const statusPanel = document.getElementById('status-panel');
    const grid = document.getElementById('grid');
    const mobileSchedule = document.getElementById('mobile-schedule');
    const mobileProgramList = document.getElementById('mobile-program-list');

    function clearLineTimers() {
      state.lineTimerIds.forEach(clearTimeout);
      state.lineTimerIds = [];
    }

    function clearTransitionTimer() {
      if (state.transitionTimerId) {
        clearTimeout(state.transitionTimerId);
        state.transitionTimerId = null;
      }
    }

    function showStatus(message, options = {}) {
      clearLineTimers();
      clearTransitionTimer();

      statusPanel.hidden = false;
      statusPanel.textContent = message;

      grid.hidden = true;
      grid.innerHTML = '';
      state.tileElementsById.clear();

      if (options.keepMobileVisible) {
        mobileSchedule.hidden = false;
      } else {
        mobileSchedule.hidden = true;
      }
    }

    function showGrid() {
      statusPanel.hidden = true;
      grid.hidden = false;
      mobileSchedule.hidden = false;
    }

    function getCurrentVancouverParts() {
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: TIMEZONE_NAME,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });

      const parts = formatter.formatToParts(new Date());
      const get = t => parts.find(p => p.type === t)?.value ?? '00';

      return {
        year: +get('year'),
        month: +get('month'),
        day: +get('day'),
        hour: +get('hour'),
        minute: +get('minute'),
        second: +get('second')
      };
    }

    function getCurrentMinutesInVancouver() {
      const p = getCurrentVancouverParts();
      return p.hour * 60 + p.minute;
    }

    function getMillisecondsUntilVancouverMinute(targetMinutes) {
      const now = getCurrentVancouverParts();
      const currentMinutes = now.hour * 60 + now.minute;

      let delta = targetMinutes - currentMinutes;
      if (delta < 0) delta += 1440;

      const msRemaining = (60 - now.second) * 1000;

      return delta === 0
        ? msRemaining
        : msRemaining + (delta - 1) * 60000;
    }

    function parseTimeToMinutes(t) {
      if (!/^\d{2}:\d{2}$/.test(t)) return null;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function formatMobileDateTime() {
      return new Intl.DateTimeFormat('en-CA', {
        timeZone: TIMEZONE_NAME,
        weekday: 'long',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      })
        .format(new Date())
        .replace(' a.m.', ' a.m.')
        .replace(' p.m.', ' p.m.')
        .replace(',', ' •');
    }

    function formatTime12Hour(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const suffix = h >= 12 ? 'p.m.' : 'a.m.';
      const hour = h % 12 || 12;
      return `${hour}:${String(m).padStart(2,'0')} ${suffix}`;
    }

    let mobileDateTimeTimerId = null;

    function startMobileDateTimeClock() {
      const el = document.getElementById('mobile-datetime');

      if (!el) return;

      const update = () => {
        el.textContent = formatMobileDateTime();
      };

      update();

      if (mobileDateTimeTimerId) {
        clearInterval(mobileDateTimeTimerId);
      }

      mobileDateTimeTimerId = setInterval(update, 60000);
    }

    function normalizeHexColor(hex) {
      return /^#[0-9a-fA-F]{6}$/.test(hex || '') ? hex : '#446688';
    }

    function hexToRgba(hex, a) {
      const h = normalizeHexColor(hex);
      const r = parseInt(h.slice(1,3),16);
      const g = parseInt(h.slice(3,5),16);
      const b = parseInt(h.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function getTilePosition(i) {
      return i < LEFT_COLUMN_COUNT
        ? { left: LAYOUT.leftX, top: LAYOUT.startY + i * LAYOUT.rowStep }
        : { left: LAYOUT.rightX, top: LAYOUT.startY + (i - LEFT_COLUMN_COUNT) * LAYOUT.rowStep };
    }

    function getVisibleEntries(entries, now) {
      return entries
        .filter(e => e.end_minutes === null || e.end_minutes > now)
        .slice(0, PAGE_SIZE);
    }

    function resolveProgramStates(entries, now) {
      const sortedEntries = Array.isArray(entries) ? entries : [];
      const currentIndex = sortedEntries.findIndex((entry) => (
        entry.start_minutes !== null
        && entry.end_minutes !== null
        && entry.start_minutes <= now
        && now < entry.end_minutes
      ));

      const currentProgram = currentIndex >= 0 ? sortedEntries[currentIndex] : null;
      const nextProgram = currentProgram
        ? (sortedEntries[currentIndex + 1] || null)
        : (sortedEntries.find((entry) => entry.start_minutes !== null && entry.start_minutes > now) || null);

      return {
        currentId: currentProgram?.id || null,
        nextId: nextProgram?.id || null
      };
    }

    function resolveNextProgramStates(entries, now) {
      const sortedEntries = Array.isArray(entries) ? entries : [];

      const eligibleEntries = sortedEntries.filter((entry) => (
        Number.isInteger(entry.start_minutes) &&
        now < (entry.start_minutes + 5)
      ));

      if (!eligibleEntries.length) {
        return {
          nextIds: new Set()
        };
      }

      const nextStartMinutes = eligibleEntries[0].start_minutes;

      return {
        nextIds: new Set(
          eligibleEntries
            .filter((entry) => entry.start_minutes === nextStartMinutes)
            .map((entry) => entry.id)
        )
      };
    }

    function getNextBoundaryMinutes(entries, now) {
      return entries
        .flatMap((entry) => {
          const boundaries = [];

          if (Number.isInteger(entry.start_minutes)) {
            boundaries.push(entry.start_minutes);
            boundaries.push(entry.start_minutes + 5);
          }

          return boundaries;
        })
        .filter((minutes) => Number.isInteger(minutes) && minutes > now)
        .sort((a, b) => a - b)[0] ?? null;
    }

    function buildMetaLine(e) {
      return `${formatTime12Hour(e.start_time)} @ ${e.location_name}`;
    }

    function scheduleLineSwap(slot, hasDescription) {
      if (!slot) return;

      slot.classList.remove('show-description');
      slot.classList.add('show-meta');

      if (!hasDescription) {
        return;
      }

      const toDesc = () => {
        slot.classList.remove('show-meta');
        slot.classList.add('show-description');
      };

      const toMeta = () => {
        slot.classList.remove('show-description');
        slot.classList.add('show-meta');
      };

      const t1 = setTimeout(() => {
        toDesc();
        const t2 = setTimeout(() => {
          toMeta();
          scheduleLineSwap(slot, hasDescription);
        }, DESC_HOLD_MS + 380);
        state.lineTimerIds.push(t2);
      }, META_HOLD_MS);

      state.lineTimerIds.push(t1);
    }

    function applyTileStateClasses(tile, entryId, programStates) {
      tile.classList.toggle('is-next', programStates.nextIds.has(entryId));
    }

    function createTile(entry, index, programStates) {
      const tile = document.createElement('article');
      tile.className = 'program-tile';
      tile.dataset.entryId = entry.id;
      applyTileStateClasses(tile, entry.id, programStates);

      const pos = getTilePosition(index);

      tile.style.left = pos.left + 'px';
      tile.style.top = pos.top + 'px';
      tile.style.background = hexToRgba(entry.hex_color, TILE_OPACITY);

      tile.style.transition = `
        left ${TRANSITION_DURATION_MS}ms cubic-bezier(0.22,1,0.36,1),
        top ${TRANSITION_DURATION_MS}ms cubic-bezier(0.22,1,0.36,1),
        opacity ${TRANSITION_DURATION_MS}ms ease,
        transform ${TRANSITION_DURATION_MS}ms ease,
        box-shadow 280ms ease
      `;

      const icon = document.createElement('div');
      icon.className = 'program-icon';

      const img = document.createElement('img');
      img.src = entry.icon_path;
      icon.appendChild(img);

      const content = document.createElement('div');
      content.className = 'program-content';

      const title = document.createElement('div');
      title.className = 'program-title';
      title.textContent = entry.title;

      const slot = document.createElement('div');
      slot.className = 'program-line-slot show-meta';

      const meta = document.createElement('div');
      meta.className = 'program-meta';
      meta.textContent = buildMetaLine(entry);

      const desc = document.createElement('div');
      desc.className = 'program-description';
      desc.textContent = String(entry.description || '').trim();

      slot.append(meta, desc);
      content.append(title, slot);
      tile.append(icon, content);

      scheduleLineSwap(slot, !!String(entry.description || '').trim());

      return tile;
    }

    function reconcile(newEntries, programStates) {
      clearLineTimers();

      const oldIds = new Set(state.visibleEntries.map(e => e.id));
      const newIds = new Set(newEntries.map(e => e.id));

      oldIds.forEach(id => {
        if (!newIds.has(id)) {
          const t = state.tileElementsById.get(id);
          if (!t) return;
          t.style.transform = 'translateX(-180px)';
          t.style.opacity = '0';
          setTimeout(() => {
            t.remove();
            state.tileElementsById.delete(id);
          }, TRANSITION_DURATION_MS);
        }
      });

      newEntries.forEach((e, i) => {
        const pos = getTilePosition(i);
        const existing = state.tileElementsById.get(e.id);
        const hasDescription = !!String(e.description || '').trim();

        if (existing) {
          existing.style.transitionDelay = `${i * 18}ms`;
          existing.style.left = pos.left + 'px';
          existing.style.top = pos.top + 'px';
          existing.style.opacity = '1';
          existing.style.transform = 'translate(0,0)';
          applyTileStateClasses(existing, e.id, programStates);

          const titleEl = existing.querySelector('.program-title');
          const metaEl = existing.querySelector('.program-meta');
          const descEl = existing.querySelector('.program-description');
          const slotEl = existing.querySelector('.program-line-slot');

          if (titleEl) titleEl.textContent = e.title;
          if (metaEl) metaEl.textContent = buildMetaLine(e);
          if (descEl) descEl.textContent = String(e.description || '').trim();

          scheduleLineSwap(slotEl, hasDescription);
        } else {
          const t = createTile(e, i, programStates);
          t.style.opacity = '0';
          t.style.transform = i >= 5 ? 'translateX(180px)' : 'translateY(12px)';

          grid.appendChild(t);
          state.tileElementsById.set(e.id, t);

          requestAnimationFrame(() => {
            t.style.left = pos.left + 'px';
            t.style.top = pos.top + 'px';
            t.style.opacity = '1';
            t.style.transform = 'translate(0,0)';
          });
        }
      });

      state.visibleEntries = newEntries;
      showGrid();
    }

    function renderMobileEmptySchedule(message = MOBILE_NO_SCHEDULE_MESSAGE) {
      mobileProgramList.innerHTML = `
        <div class="mobile-empty-message">
          ${message}
        </div>
      `;

      mobileSchedule.hidden = false;
    }

    function renderMobileSchedule(entries, programStates) {
      mobileProgramList.innerHTML = '';

      if (!entries.length) {
        mobileProgramList.innerHTML = `
          <div class="mobile-empty-message">
            No remaining programs scheduled today.
          </div>
        `;
        return;
      }

      entries.forEach((entry) => {
        const item = document.createElement('article');
        item.className = 'mobile-program-card';
        item.classList.toggle('is-next', programStates.nextIds.has(entry.id));
        item.style.setProperty('--mobile-location-color', normalizeHexColor(entry.hex_color));

        const icon = document.createElement('img');
        icon.className = 'mobile-program-icon';
        icon.src = entry.icon_path;
        icon.alt = '';

        const content = document.createElement('div');
        content.className = 'mobile-program-content';

        const time = document.createElement('div');
        time.className = 'mobile-program-time';
        time.textContent = formatTime12Hour(entry.start_time);

        const title = document.createElement('h2');
        title.className = 'mobile-program-title';
        title.textContent = entry.title;

        const location = document.createElement('div');
        location.className = 'mobile-program-location';
        location.textContent = entry.location_name;

        content.append(time, title, location);

        if (String(entry.description || '').trim()) {
          const description = document.createElement('p');
          description.className = 'mobile-program-description';
          description.textContent = String(entry.description || '').trim();
          content.appendChild(description);
        }

        item.append(icon, content);
        mobileProgramList.appendChild(item);
      });
    }

    function refreshQueue() {
      const now = getCurrentMinutesInVancouver();
      const visible = getVisibleEntries(state.allEntries, now);
      const programStates = resolveNextProgramStates(state.allEntries, now);

      renderMobileSchedule(visible, programStates);

      if (!visible.length) {
        renderMobileEmptySchedule('No remaining programs scheduled today.');
        return showStatus('Thanks for visiting! Today’s programs have finished.', { keepMobileVisible: true });
      }

      reconcile(visible, programStates);

      const next = getNextBoundaryMinutes(state.allEntries, now);
      if (!next) return;

      const ms = getMillisecondsUntilVancouverMinute(next) + BOUNDARY_FUDGE_MS;
      state.transitionTimerId = setTimeout(refreshQueue, ms);
    }

    async function initialize() {
      showStatus('Loading program schedule...');
      startMobileDateTimeClock();

      const today = new Intl.DateTimeFormat('en-CA', { timeZone: TIMEZONE_NAME }).format(new Date());

      const [locRes, schedRes] = await Promise.all([
        supabaseClient.from('program_location_styles').select('*').eq('is_active', true),
        supabaseClient.from('program_schedule_sets').select('*').eq('schedule_date', today).eq('mode', 'live').maybeSingle()
      ]);

      if (locRes.error || schedRes.error) {
        renderMobileEmptySchedule(LOAD_ERROR_MESSAGE);
        return showStatus(LOAD_ERROR_MESSAGE, { keepMobileVisible: true });
      }

      if (!schedRes.data) {
        renderMobileEmptySchedule(MOBILE_NO_SCHEDULE_MESSAGE);
        return showStatus(PUBLIC_NO_SCHEDULE_MESSAGE, { keepMobileVisible: true });
      }

      const locMap = Object.fromEntries(locRes.data.map(l => [l.location_key, l]));

      state.allEntries = schedRes.data.entries_json
        .filter(e => !e.is_cancelled)
        .map(e => ({
          ...e,
          start_minutes: parseTimeToMinutes(e.start_time),
          end_minutes: parseTimeToMinutes(e.end_time),
          location_name: locMap[e.location_key]?.display_name || e.location_key,
          icon_path: `./assets/icons/${e.location_key}.svg`,
          hex_color: locMap[e.location_key]?.hex_color || '#446688'
        }))
        .sort((a, b) => a.start_minutes - b.start_minutes);

      grid.innerHTML = '';
      state.tileElementsById.clear();

      const now = getCurrentMinutesInVancouver();
      const visible = getVisibleEntries(state.allEntries, now);
      const programStates = resolveNextProgramStates(state.allEntries, now);

      renderMobileSchedule(visible, programStates);

      visible.forEach((e, i) => {
        const t = createTile(e, i, programStates);
        grid.appendChild(t);
        state.tileElementsById.set(e.id, t);
      });

      state.visibleEntries = visible;
      showGrid();
      refreshQueue();
    }

    document.addEventListener('DOMContentLoaded', initialize);
  </script>
  
</body>
</html>
