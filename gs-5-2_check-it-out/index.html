<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=1920, initial-scale=0.6667, minimum-scale=0.6667, maximum-scale=0.6667, user-scalable=no"
  />
  <title>VAQ Poster Slideshow</title>
  <link rel="stylesheet" href="./index.css?v=1" />
</head>

<!--
    Target container: 1920 x 810 px
    Static poster slideshow for Kuusoft / NexSigns.
    Shared assets expected in ../assets/
    Poster artwork expected in ./vaq-posters/
    Poster artwork should be pre-cropped to 498 x 720 px.
-->

<body>
  <main class="page">
    <div class="bg-rotator" aria-hidden="true"></div>

    <div class="content-layer">
      <div id="status-panel" class="status-panel" hidden></div>

      <section id="poster-slideshow" class="poster-slideshow" aria-label="Poster slideshow" hidden>
        <div class="poster-row">
          <article class="poster-slot" data-slot-index="0">
            <div class="poster-frame" aria-hidden="true"></div>
            <div class="poster-glow" aria-hidden="true"></div>
            <img class="poster-image" alt="" />
            <div class="poster-fallback">Poster<br>Unavailable</div>
          </article>

          <article class="poster-slot" data-slot-index="1">
            <div class="poster-frame" aria-hidden="true"></div>
            <div class="poster-glow" aria-hidden="true"></div>
            <img class="poster-image" alt="" />
            <div class="poster-fallback">Poster<br>Unavailable</div>
          </article>

          <article class="poster-slot" data-slot-index="2">
            <div class="poster-frame" aria-hidden="true"></div>
            <div class="poster-glow" aria-hidden="true"></div>
            <img class="poster-image" alt="" />
            <div class="poster-fallback">Poster<br>Unavailable</div>
          </article>
        </div>
      </section>
    </div>
  </main>

  <script>
    const POSTER_BASE_PATH = './vaq-posters/';

    /*
      Static GitHub Pages / Kuusoft note:
      Browsers cannot reliably enumerate files in a folder.
      Add poster filenames here whenever artwork is added to /vaq-posters/.
      Each file should be pre-cropped to exactly 498 x 720 px.
    */
    const POSTER_FILES = [
      'clownfish-cone.jpg',
      'dragons-bite.jpg',
      'piranha-pockets.jpg',
      'pupsicle-chiller.jpg',
      'soccer-otter.jpg',
      'sweet-seal.jpg'
    ];

    const SLOT_COUNT = 3;
    const ROTATION_MS = 8500;
    const TRANSITION_MS = 820;
    const STARTUP_STAGGER_MS = 130;

    const FALLBACK_PRIMARY = '#404020';
    const FALLBACK_SECONDARY = '#c0c0e0';

    const state = {
      posters: [],
      visibleBySlot: new Array(SLOT_COUNT).fill(null),
      rotationTimerId: null,
      slotCursor: 0,
      posterCursor: 0
    };

    const ui = {
      statusPanel: document.getElementById('status-panel'),
      posterSlideshow: document.getElementById('poster-slideshow'),
      slots: Array.from(document.querySelectorAll('.poster-slot'))
    };

    function showStatus(message) {
      ui.statusPanel.hidden = false;
      ui.statusPanel.textContent = message;
      ui.posterSlideshow.hidden = true;
    }

    function showSlideshow() {
      ui.statusPanel.hidden = true;
      ui.posterSlideshow.hidden = false;
    }

    function normalizePosterPath(filename) {
      return `${POSTER_BASE_PATH}${String(filename || '').trim().replace(/^\/+/, '')}`;
    }

    function getPosterLabel(filename) {
      return String(filename || '')
        .split('/')
        .pop()
        .replace(/\.[a-z0-9]+$/i, '')
        .replace(/[-_]+/g, ' ')
        .trim();
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function componentToHex(value) {
      return clamp(Math.round(value), 0, 255).toString(16).padStart(2, '0');
    }

    function rgbToHex(color) {
      return `#${componentToHex(color.r)}${componentToHex(color.g)}${componentToHex(color.b)}`;
    }

    function rgbToHsl(r, g, b) {
      r /= 255;
      g /= 255;
      b /= 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const lightness = (max + min) / 2;

      if (max === min) {
        return { h: 0, s: 0, l: lightness };
      }

      const delta = max - min;
      const saturation = lightness > 0.5
        ? delta / (2 - max - min)
        : delta / (max + min);

      let hue;

      switch (max) {
        case r:
          hue = (g - b) / delta + (g < b ? 6 : 0);
          break;
        case g:
          hue = (b - r) / delta + 2;
          break;
        default:
          hue = (r - g) / delta + 4;
          break;
      }

      hue /= 6;

      return { h: hue, s: saturation, l: lightness };
    }

    function colorDistance(a, b) {
      return Math.sqrt(
        Math.pow(a.r - b.r, 2) +
        Math.pow(a.g - b.g, 2) +
        Math.pow(a.b - b.b, 2)
      );
    }

    function adjustColor(color, amount) {
      return {
        r: clamp(color.r + amount, 0, 255),
        g: clamp(color.g + amount, 0, 255),
        b: clamp(color.b + amount, 0, 255)
      };
    }

    function getDominantColors(image) {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { willReadFrequently: true });

      canvas.width = 48;
      canvas.height = 69;

      context.drawImage(image, 0, 0, canvas.width, canvas.height);

      const { data } = context.getImageData(0, 0, canvas.width, canvas.height);
      const bins = new Map();

      for (let index = 0; index < data.length; index += 4) {
        const r = data[index];
        const g = data[index + 1];
        const b = data[index + 2];
        const a = data[index + 3];

        if (a < 200) continue;

        const hsl = rgbToHsl(r, g, b);
        const luminance = (0.2126 * r) + (0.7152 * g) + (0.0722 * b);

        if (luminance < 22 || luminance > 238) continue;

        const bucket = {
          r: Math.round(r / 24) * 24,
          g: Math.round(g / 24) * 24,
          b: Math.round(b / 24) * 24
        };

        const key = `${bucket.r},${bucket.g},${bucket.b}`;
        const existing = bins.get(key) || {
          ...bucket,
          score: 0,
          count: 0
        };

        existing.count += 1;
        existing.score += 1 + hsl.s * 3 + (1 - Math.abs(hsl.l - 0.52));

        bins.set(key, existing);
      }

      const rankedColors = Array.from(bins.values())
        .sort((a, b) => b.score - a.score);

      if (!rankedColors.length) {
        return {
          primary: FALLBACK_PRIMARY,
          secondary: FALLBACK_SECONDARY
        };
      }

      const primary = rankedColors[0];
      const secondary = rankedColors.find((candidate) => colorDistance(primary, candidate) > 78)
        || adjustColor(primary, primary.r + primary.g + primary.b > 380 ? -72 : 72);

      return {
        primary: rgbToHex(primary),
        secondary: rgbToHex(secondary)
      };
    }

    function getAppearanceSignature(image) {
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { willReadFrequently: true });

      canvas.width = 8;
      canvas.height = 8;

      context.drawImage(image, 0, 0, canvas.width, canvas.height);

      const { data } = context.getImageData(0, 0, canvas.width, canvas.height);
      const luminanceValues = [];

      for (let index = 0; index < data.length; index += 4) {
        luminanceValues.push(
          (0.2126 * data[index]) +
          (0.7152 * data[index + 1]) +
          (0.0722 * data[index + 2])
        );
      }

      const average = luminanceValues.reduce((sum, value) => sum + value, 0) / luminanceValues.length;

      return luminanceValues
        .map((value) => value >= average ? '1' : '0')
        .join('');
    }

    function analyzePosterImage(image, src) {
      try {
        return {
          ...getDominantColors(image),
          signature: getAppearanceSignature(image)
        };
      } catch (error) {
        console.warn(`Poster analysis failed for ${src}:`, error);

        return {
          primary: FALLBACK_PRIMARY,
          secondary: FALLBACK_SECONDARY,
          signature: src
        };
      }
    }

    function loadPoster(filename, index) {
      return new Promise((resolve) => {
        const src = normalizePosterPath(filename);
        const image = new Image();

        image.decoding = 'async';

        image.onload = () => {
          const analysis = analyzePosterImage(image, src);

          resolve({
            alt: getPosterLabel(filename) || `Poster ${index + 1}`,
            filename,
            key: analysis.signature || src,
            primary: analysis.primary,
            secondary: analysis.secondary,
            src
          });
        };

        image.onerror = () => {
          console.warn(`Unable to load poster: ${src}`);
          resolve(null);
        };

        image.src = src;
      });
    }

    function shuffleItems(items) {
      const nextItems = [...items];

      for (let index = nextItems.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [nextItems[index], nextItems[randomIndex]] = [nextItems[randomIndex], nextItems[index]];
      }

      return nextItems;
    }

    function getVisibleKeysExcept(slotIndex) {
      return new Set(
        state.visibleBySlot
          .map((poster, index) => index === slotIndex ? null : poster)
          .filter(Boolean)
          .map((poster) => poster.key)
      );
    }

    function getUniquePosterCount() {
      return new Set(state.posters.map((poster) => poster.key)).size;
    }

    function chooseNextPoster(slotIndex) {
      const blockedKeys = getVisibleKeysExcept(slotIndex);
      const currentPoster = state.visibleBySlot[slotIndex];

      for (let attempt = 0; attempt < state.posters.length * 2; attempt += 1) {
        const poster = state.posters[state.posterCursor % state.posters.length];

        state.posterCursor = (state.posterCursor + 1) % state.posters.length;

        if (blockedKeys.has(poster.key)) continue;

        if (currentPoster && poster.src === currentPoster.src && state.posters.length > SLOT_COUNT) {
          continue;
        }

        return poster;
      }

      return state.posters.find((poster) => !blockedKeys.has(poster.key)) || state.posters[0];
    }

    function setSlotPoster(slotIndex, poster, options = {}) {
      const slot = ui.slots[slotIndex];
      const image = slot.querySelector('.poster-image');
      const fallback = slot.querySelector('.poster-fallback');

      const applyPoster = () => {
        slot.style.setProperty('--poster-primary', poster.primary);
        slot.style.setProperty('--poster-secondary', poster.secondary);

        image.alt = poster.alt;
        image.src = poster.src;
        image.style.display = 'block';

        fallback.style.display = 'none';

        state.visibleBySlot[slotIndex] = poster;
      };

      if (options.immediate) {
        applyPoster();

        window.setTimeout(() => {
          slot.classList.add('is-visible');
        }, slotIndex * STARTUP_STAGGER_MS);

        return;
      }

      slot.classList.remove('is-entering');
      slot.classList.add('is-exiting');

      window.setTimeout(() => {
        applyPoster();

        slot.classList.remove('is-exiting');
        slot.classList.add('is-entering', 'is-visible');

        window.setTimeout(() => {
          slot.classList.remove('is-entering');
        }, TRANSITION_MS);
      }, TRANSITION_MS);
    }

    function rotateOnePoster() {
      const slotIndex = state.slotCursor % SLOT_COUNT;
      const poster = chooseNextPoster(slotIndex);

      state.slotCursor = (state.slotCursor + 1) % SLOT_COUNT;

      if (poster) {
        setSlotPoster(slotIndex, poster);
      }
    }

    function startRotation() {
      if (state.rotationTimerId) {
        window.clearInterval(state.rotationTimerId);
      }

      state.rotationTimerId = window.setInterval(rotateOnePoster, ROTATION_MS);
    }

    async function initialize() {
      showStatus('Loading posters...');

      const loadedPosters = await Promise.all(
        POSTER_FILES.map((filename, index) => loadPoster(filename, index))
      );

      state.posters = shuffleItems(loadedPosters.filter(Boolean));

      if (state.posters.length < SLOT_COUNT) {
        showStatus('Poster slideshow needs at least 3 valid poster files.');
        return;
      }

      if (getUniquePosterCount() < SLOT_COUNT) {
        showStatus('Poster slideshow needs at least 3 visually unique poster files.');
        return;
      }

      for (let slotIndex = 0; slotIndex < SLOT_COUNT; slotIndex += 1) {
        const poster = chooseNextPoster(slotIndex);
        setSlotPoster(slotIndex, poster, { immediate: true });
      }

      showSlideshow();
      startRotation();
    }

    ui.slots.forEach((slot) => {
      const image = slot.querySelector('.poster-image');
      const fallback = slot.querySelector('.poster-fallback');

      image.addEventListener('error', () => {
        image.style.display = 'none';
        fallback.style.display = 'flex';
      });
    });

    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
