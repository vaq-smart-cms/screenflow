    function showStatus(message) {

    function clearTimers() {
      state.timers.forEach((timerId) => window.clearTimeout(timerId));
      state.timers = [];

      if (state.liveRefreshTimerId) {
        window.clearTimeout(state.liveRefreshTimerId);
        state.liveRefreshTimerId = null;
      }

      if (state.showtimeBoundaryTimerId) {
        window.clearTimeout(state.showtimeBoundaryTimerId);
        state.showtimeBoundaryTimerId = null;
      }

      if (state.advisoryTimerId) {
        window.clearTimeout(state.advisoryTimerId);
        state.advisoryTimerId = null;
      }

      if (state.testimonialTimerId) {
        window.clearTimeout(state.testimonialTimerId);
        state.testimonialTimerId = null;
      }

      if (state.testimonialHideTimerId) {
        window.clearTimeout(state.testimonialHideTimerId);
        state.testimonialHideTimerId = null;
      }
    }

    function setManagedTimeout(callback, delayMs) {
      const timerId = window.setTimeout(() => {
        state.timers = state.timers.filter((id) => id !== timerId);
        callback();
      }, delayMs);

      state.timers.push(timerId);
      return timerId;
    }

    function normalizeAccessibilityKey(value) {
      if (!value) return '';

      const key = String(value)
        .trim()
        .toLowerCase()
        .replace(/[\s-]+/g, '_');

      const aliases = {
        wheelchair_access: 'wheelchair',
        wheelchair_accessible: 'wheelchair',
        audio: 'assistive',
        audio_assistive: 'assistive',
        assistive_listening: 'assistive',
        closed_captioning: 'captions',
        closed_captions: 'captions',
        captioning: 'captions',
        service_animals: 'service_animal',
        service_dog: 'service_animal',
        induction_loop: 'inductive',
        hearing_loop: 'inductive'
      };

      return aliases[key] || key;
    }

    function inferAccessibilityKeyFromText(value) {
      const text = String(value || '').toLowerCase();

      if (text.includes('wheelchair')) return 'wheelchair';
      if (text.includes('assistive') || text.includes('listening') || text.includes('audio')) return 'assistive';
      if (text.includes('caption')) return 'captions';
      if (text.includes('service animal') || text.includes('service dog')) return 'service_animal';
      if (text.includes('inductive') || text.includes('hearing loop') || text.includes('induction')) return 'inductive';

      return '';
    }

    function getActiveAccessibilityItems(value) {
      return normalizeItemArray(value)
        .map((item) => {
          const explicitKey = normalizeAccessibilityKey(item?.key);
          const inferredKey = inferAccessibilityKeyFromText(item?.text);
          const resolvedKey = explicitKey || inferredKey;

          return {
            ...item,
            key: resolvedKey
          };
        })
        .filter((item) => item && item.text && item.is_active === true)
        .filter((item) => item.key && ACCESSIBILITY_ICON_BY_KEY[item.key])
        .sort((a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0));
    }

    function expandDelimitedTextItems(value) {
      return normalizeItemArray(value)
        .flatMap((item) => {
          const text = String(item?.text || '').trim();

          if (!text.includes('|')) {
            return [item];
          }

          return text
            .split('|')
            .map((part, index) => ({
              ...item,
              text: part.trim(),
              sort_order: Number(item.sort_order || 0) + index * 0.01
            }))
            .filter((splitItem) => splitItem.text);
        });
    }

    function normalizeHexColor(value, fallback) {
      return /^#[0-9a-fA-F]{6}$/.test(String(value || '')) ? value : fallback;
    }

    function normalizePosterCode(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .split('/')
        .pop()
        .replace(/_poster_(sm|md|lg)\.jpe?g$/i, '')
        .replace(/[^a-z0-9_-]/g, '');
    }

    function buildPosterUrl(code, size = POSTER_SIZE) {
      const cleanCode = normalizePosterCode(code);
      return cleanCode ? `${POSTER_BASE_PATH}${cleanCode}_poster_${size}.jpg` : '';
    }

    function normalizeItemArray(value) {
      if (Array.isArray(value)) return value;

      if (!value) return [];

      if (typeof value === 'string') {
        try {
          const parsed = JSON.parse(value);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return value.trim()
            ? [{ text: value.trim(), is_active: true, sort_order: 1 }]
            : [];
        }
      }

      return [];
    }

    function getActiveTextItems(value) {
      const seen = new Set();

      return normalizeItemArray(value)
        .flatMap((item) => {
          const text = String(item?.text || '').trim();

          if (!text) return [];

          if (!text.includes('|')) {
            return [item];
          }

          return text
            .split('|')
            .map((part, index) => ({
              ...item,
              text: part.trim(),
              sort_order: Number(item.sort_order || 0) + index * 0.01
            }))
            .filter((splitItem) => splitItem.text);
        })
        .filter((item) => item && item.text && item.is_active === true)
        .filter((item) => {
          const key = item.text.trim().toLowerCase();

          if (seen.has(key)) {
            return false;
          }

          seen.add(key);
          return true;
        })
        .sort((a, b) => Number(a.sort_order || 0) - Number(b.sort_order || 0));
    }

    function formatShowtime(isoString, options = {}) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return '';

      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: TIMEZONE_NAME,
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).formatToParts(date);

      const hour = parts.find((part) => part.type === 'hour')?.value || '';
      const minute = parts.find((part) => part.type === 'minute')?.value || '';
      const dayPeriodRaw = parts.find((part) => part.type === 'dayPeriod')?.value || '';
      const dayPeriod = dayPeriodRaw.toLowerCase().replace(' ', '');

      if (options.omitMeridiem) {
        return `${hour}:${minute}`;
      }

      return `${hour}:${minute} ${dayPeriod}`;
    }

    function getShowtimeMeridiem(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return '';

      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: TIMEZONE_NAME,
        hour: 'numeric',
        hour12: true
      }).formatToParts(date);

      return String(parts.find((part) => part.type === 'dayPeriod')?.value || '')
        .toLowerCase()
        .replace(' ', '');
    }

    function getShowtimeMs(showtime) {
      const time = new Date(showtime?.show_at).getTime();
      return Number.isFinite(time) ? time : null;
    }

    function getFutureShowtimes(showtimes) {
      const now = Date.now();

      return normalizeItemArray(showtimes)
        .filter((showtime) => !showtime.is_cancelled)
        .filter((showtime) => {
          const time = getShowtimeMs(showtime);
          return time !== null && time > now;
        })
        .sort((a, b) => getShowtimeMs(a) - getShowtimeMs(b));
    }

    function getNextShowtimeBoundaryDelayMs(showtimes) {
      const now = Date.now();

      const nextTime = normalizeItemArray(showtimes)
        .filter((showtime) => !showtime.is_cancelled)
        .map(getShowtimeMs)
        .filter((time) => time !== null && time > now)
        .sort((a, b) => a - b)[0];

      if (!nextTime) return null;

      return Math.max(1000, nextTime - now + SHOWTIME_BOUNDARY_FUDGE_MS);
    }

    function renderPoster(data) {
      const primary = normalizeHexColor(data.theme_color_primary, '#646e78');
      const secondary = normalizeHexColor(data.theme_color_secondary, '#2f3a40');

      document.documentElement.style.setProperty('--film-primary', primary);
      document.documentElement.style.setProperty('--film-secondary', secondary);

      const posterUrl = buildPosterUrl(data.poster_url, 'lg');

      ui.posterImage.alt = `${data.film_title || '4D film'} poster`;

      if (!posterUrl) {
        ui.posterImage.style.display = 'none';
        ui.posterFallback.style.display = 'flex';
        return;
      }

      ui.posterFallback.style.display = 'none';

      ui.posterImage.classList.add('is-loading');
      ui.posterImage.style.display = 'block';

      const nextImage = new Image();

      nextImage.onload = () => {
        ui.posterImage.src = posterUrl;

        requestAnimationFrame(() => {
          ui.posterImage.classList.remove('is-loading');
        });
      };

      nextImage.onerror = () => {
        ui.posterImage.style.display = 'none';
        ui.posterFallback.style.display = 'flex';
      };

      nextImage.src = posterUrl;
    }

    function showAccessibilityIcons() {
      ui.testimonialPanel.classList.remove('is-visible');

      window.setTimeout(() => {
        ui.accessibilityIcons.hidden = ui.accessibilityIcons.children.length === 0;
        ui.accessibilityIcons.classList.remove('is-muted');
      }, 420);
    }

    function showTestimonial(activeTestimonials) {
      if (ui.signLayout.classList.contains('is-ended')) return;

      if (!activeTestimonials.length) return;

      const item = activeTestimonials[state.testimonialIndex] || activeTestimonials[0];

      ui.accessibilityIcons.classList.add('is-muted');

      window.setTimeout(() => {
        ui.accessibilityIcons.hidden = true;
        ui.testimonialPanel.textContent = item.text;
        ui.testimonialPanel.classList.add('is-visible');
      }, 420);

      state.testimonialIndex = (state.testimonialIndex + 1) % activeTestimonials.length;

      state.testimonialHideTimerId = window.setTimeout(() => {
        showAccessibilityIcons();
      }, TESTIMONIAL_ROTATION_MS);
    }

    function scheduleTestimonialInterrupt(data) {
      if (state.testimonialTimerId) {
        window.clearTimeout(state.testimonialTimerId);
        state.testimonialTimerId = null;
      }

      const activeTestimonials = getActiveTextItems(data.testimonials);

      if (ui.signLayout.classList.contains('is-ended')) {
        showAccessibilityIcons();
        return;
      }

      if (!activeTestimonials.length) {
        showAccessibilityIcons();
        return;
      }

      state.testimonialTimerId = window.setTimeout(() => {
        showTestimonial(activeTestimonials);
        scheduleTestimonialInterrupt(data);
      }, TESTIMONIAL_INTERRUPT_MS);
    }

    function renderAccessibility(data) {
      const activeItems = getActiveAccessibilityItems(data.accessibility).slice(0, 5);

      console.table(activeItems.map((item) => ({
        text: item.text,
        key: item.key,
        icon: ACCESSIBILITY_ICON_BY_KEY[item.key]
      })));

      ui.accessibilityIcons.innerHTML = '';
      ui.accessibilityIcons.dataset.count = String(activeItems.length);

      activeItems.forEach((item, index) => {
        const circle = document.createElement('div');
        circle.className = 'accessibility-icon';
        circle.title = item.text;
        circle.style.transitionDelay = `${index * 60}ms`;

        const img = document.createElement('img');
        img.src = ACCESSIBILITY_ICON_BY_KEY[item.key] || ACCESSIBILITY_ICON_BY_KEY.information;
        img.alt = '';

        circle.appendChild(img);
        ui.accessibilityIcons.appendChild(circle);
      });

      ui.accessibilityIcons.hidden = activeItems.length === 0;
      ui.accessibilityIcons.closest('.supplemental-region')?.classList.toggle('is-empty', activeItems.length === 0);
    }

    function scheduleAdvisoryRotation(activeItems) {
      if (state.advisoryTimerId) {
        window.clearTimeout(state.advisoryTimerId);
        state.advisoryTimerId = null;
      }

      if (ui.signLayout.classList.contains('is-ended')) {
        return;
      }

      if (!activeItems.length || activeItems.length === 1) {
        return;
      }

      state.advisoryTimerId = window.setTimeout(() => {
        if (ui.signLayout.classList.contains('is-ended')) {
          return;
        }

        state.advisoryIndex = (state.advisoryIndex + 1) % activeItems.length;

        ui.advisoryText.classList.add('is-fading');

        window.setTimeout(() => {
          ui.advisoryText.textContent = activeItems[state.advisoryIndex].text;
          ui.advisoryText.classList.remove('is-fading');
          scheduleAdvisoryRotation(activeItems);
        }, 500);
      }, ADVISORY_ROTATION_MS);
    }

    function renderAdvisory(data, options = {}) {
      const activeItems = getActiveTextItems(data.advisories);

      console.log('Advisory items for signage:', activeItems);

      if (!activeItems.length) {
        ui.advisoryRegion.hidden = true;
        ui.advisoryText.textContent = '';
        state.advisoryIndex = 0;
        return;
      }

      ui.advisoryRegion.hidden = false;

      if (state.advisoryIndex >= activeItems.length) {
        state.advisoryIndex = 0;
      }

      ui.advisoryText.textContent = activeItems[state.advisoryIndex].text;

      if (!options.preserveTimers) {
        scheduleAdvisoryRotation(activeItems);
      }
    }

    function createShowtimeElement(showtime, index, shouldShowMeridiem) {
      const item = document.createElement('div');
      const showtimeId = showtime.id || showtime.show_at;

      item.className = 'showtime-item is-entering';
      item.dataset.showtimeId = showtimeId;

      if (index === 0) {
        item.classList.add('is-next');
      }

      item.innerHTML = shouldShowMeridiem
        ? `${formatShowtime(showtime.show_at, { omitMeridiem: true })}<span class="showtime-meridiem">${getShowtimeMeridiem(showtime.show_at)}</span>`
        : formatShowtime(showtime.show_at, { omitMeridiem: true });

      requestAnimationFrame(() => {
        item.classList.remove('is-entering');
      });

      return item;
    }

    function updateShowtimeElement(item, showtime, index, shouldShowMeridiem) {
      item.classList.toggle('is-next', index === 0);
      item.innerHTML = shouldShowMeridiem
        ? `${formatShowtime(showtime.show_at, { omitMeridiem: true })}<span class="showtime-meridiem">${getShowtimeMeridiem(showtime.show_at)}</span>`
        : formatShowtime(showtime.show_at, { omitMeridiem: true });
    }

    function captureShowtimePositions() {
      const positions = new Map();

      state.showtimeElementsById.forEach((element, id) => {
        positions.set(id, element.getBoundingClientRect());
      });

      return positions;
    }

    function animateShowtimeReflow(previousPositions) {
      state.showtimeElementsById.forEach((element, id) => {
        const previous = previousPositions.get(id);
        if (!previous) return;

        const current = element.getBoundingClientRect();
        const deltaX = previous.left - current.left;
        const deltaY = previous.top - current.top;

        if (!deltaX && !deltaY) return;

        element.classList.add('is-moving');
        element.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

        requestAnimationFrame(() => {
          element.style.transform = 'translate(0, 0)';
          window.setTimeout(() => {
            element.classList.remove('is-moving');
          }, SHOWTIME_TRANSITION_MS);
        });
      });
    }

    function setNextShowTile(label, timeText = '') {
      ui.nextShowLabel.textContent = label;
      ui.nextShowTime.textContent = timeText;
      ui.nextShowSeparator.hidden = !timeText;
    }

    function renderShowtimes(data) {
      const previousPositions = captureShowtimePositions();
      const futureShowtimes = getFutureShowtimes(data.showtimes);

      if (!futureShowtimes.length) {
        ui.signLayout.classList.add('is-ended');

        if (state.advisoryTimerId) {
          window.clearTimeout(state.advisoryTimerId);
          state.advisoryTimerId = null;
        }

        if (state.testimonialTimerId) {
          window.clearTimeout(state.testimonialTimerId);
          state.testimonialTimerId = null;
        }

        if (state.testimonialHideTimerId) {
          window.clearTimeout(state.testimonialHideTimerId);
          state.testimonialHideTimerId = null;
        }

        ui.testimonialPanel.classList.remove('is-visible');
        ui.accessibilityIcons.classList.remove('is-muted');

        state.showtimeElementsById.forEach((element) => {
          element.classList.add('is-departing');
          element.style.opacity = '0';
          window.setTimeout(() => element.remove(), SHOWTIME_TRANSITION_MS);
        });

        state.showtimeElementsById.clear();
        state.visibleShowtimeIds.clear();

        ui.showtimesGrid.innerHTML = `
          <div class="showtimes-end-message">
            Shows have ended for today
            <span>${END_OF_DAY_BODY_LABEL}</span>
          </div>
        `;

        return;
      }

      ui.signLayout.classList.remove('is-ended');

      const showtimeCount = futureShowtimes.length;
      const rowsPerColumn = Math.max(1, Math.ceil(showtimeCount / 3));

      ui.showtimesGrid.style.setProperty('--rows-per-column', String(rowsPerColumn));

      if (showtimeCount <= 3) {
        ui.showtimesGrid.style.setProperty('--showtime-font-size', '78px');
        ui.showtimesGrid.style.setProperty('--showtime-column-gap', '150px');
        ui.showtimesGrid.style.setProperty('--showtime-row-gap', '28px');
      } else if (showtimeCount <= 5) {
        ui.showtimesGrid.style.setProperty('--showtime-font-size', '70px');
        ui.showtimesGrid.style.setProperty('--showtime-column-gap', '130px');
        ui.showtimesGrid.style.setProperty('--showtime-row-gap', '24px');
      } else if (showtimeCount <= 7) {
        ui.showtimesGrid.style.setProperty('--showtime-font-size', '64px');
        ui.showtimesGrid.style.setProperty('--showtime-column-gap', '110px');
        ui.showtimesGrid.style.setProperty('--showtime-row-gap', '22px');
      } else {
        ui.showtimesGrid.style.setProperty('--showtime-font-size', '58px');
        ui.showtimesGrid.style.setProperty('--showtime-column-gap', '82px');
        ui.showtimesGrid.style.setProperty('--showtime-row-gap', '18px');
      }
      setNextShowTile('Next show', formatShowtime(futureShowtimes[0].show_at));

      const nextVisibleIds = new Set(futureShowtimes.map((showtime) => showtime.id));

      state.visibleShowtimeIds.forEach((id) => {
        if (!nextVisibleIds.has(id)) {
          const staleElement = state.showtimeElementsById.get(id);

          if (!staleElement) return;

          staleElement.classList.add('is-departing');
          staleElement.style.opacity = '0';

          window.setTimeout(() => {
            staleElement.remove();
            state.showtimeElementsById.delete(id);
          }, SHOWTIME_TRANSITION_MS);
        }
      });

      let previousVisibleMeridiem = '';

      futureShowtimes.forEach((showtime, index) => {
        const currentMeridiem = getShowtimeMeridiem(showtime.show_at);
        const shouldShowMeridiem = currentMeridiem && currentMeridiem !== previousVisibleMeridiem;

        let item = state.showtimeElementsById.get(showtime.id);

        if (!item) {
          item = createShowtimeElement(showtime, index, shouldShowMeridiem, currentMeridiem);
          ui.showtimesGrid.appendChild(item);
          state.showtimeElementsById.set(showtime.id, item);

          requestAnimationFrame(() => {
            item.style.opacity = '1';
            item.style.transform = 'translateY(0)';
          });
        } else {
          item.classList.toggle('is-next', index === 0);

          item.innerHTML = shouldShowMeridiem
            ? `${formatShowtime(showtime.show_at, { omitMeridiem: true })}<span class="showtime-meridiem">${currentMeridiem}</span>`
            : formatShowtime(showtime.show_at, { omitMeridiem: true });

          ui.showtimesGrid.appendChild(item);
        }

        previousVisibleMeridiem = currentMeridiem || previousVisibleMeridiem;
      });

      state.visibleShowtimeIds = nextVisibleIds;

      requestAnimationFrame(() => {
        animateShowtimeReflow(previousPositions);
      });
    }

    async function refreshLiveSchedule() {
      try {
        const liveData = await fetchLiveSchedule();

        if (!liveData) {
          showStatus('4D showtimes unavailable');
          return;
        }

        renderSign(liveData, { preserveTimers: true });
      } catch (error) {
        console.error('Failed to refresh live 4D signage data:', error);
      }
    }

    function scheduleDataRefresh() {
      setManagedTimeout(async () => {
        await refreshLiveSchedule();
        scheduleDataRefresh();
      }, DATA_REFRESH_MS);
    }

    function scheduleShowtimeBoundaryRefresh() {
      if (state.showtimeBoundaryTimerId) {
        window.clearTimeout(state.showtimeBoundaryTimerId);
        state.showtimeBoundaryTimerId = null;
      }

      const delay = getNextShowtimeBoundaryDelayMs(state.schedule?.showtimes || []);

      if (!delay) return;

      state.showtimeBoundaryTimerId = window.setTimeout(() => {
        renderShowtimes(state.schedule);
        scheduleShowtimeBoundaryRefresh();
      }, delay);
    }

    function getPayloadSignature(data) {
      if (!data) return '';

      return JSON.stringify({
        schedule_id: data.schedule_id,
        updated_at: data.updated_at,
        published_at: data.published_at,
        film_id: data.film_id,
        theme_color_primary: data.theme_color_primary,
        theme_color_secondary: data.theme_color_secondary,
        poster_url: data.poster_url,
        accessibility: data.accessibility,
        advisories: data.advisories,
        testimonials: data.testimonials,
        showtimes: data.showtimes
      });
    }

    function restartSupplementalTimers(data) {
      if (ui.signLayout.classList.contains('is-ended')) return;

      if (state.advisoryTimerId) {
        window.clearTimeout(state.advisoryTimerId);
        state.advisoryTimerId = null;
      }

      if (state.testimonialTimerId) {
        window.clearTimeout(state.testimonialTimerId);
        state.testimonialTimerId = null;
      }

      if (state.testimonialHideTimerId) {
        window.clearTimeout(state.testimonialHideTimerId);
        state.testimonialHideTimerId = null;
      }

      ui.testimonialPanel.classList.remove('is-visible');
      ui.accessibilityIcons.classList.remove('is-muted');

      renderAdvisory(data);
      scheduleTestimonialInterrupt(data);
    }

    function scheduleLiveRefresh() {
      if (state.liveRefreshTimerId) {
        window.clearTimeout(state.liveRefreshTimerId);
        state.liveRefreshTimerId = null;
      }

      state.liveRefreshTimerId = window.setTimeout(async () => {
        try {
          const liveData = await fetchLiveSchedule();

          if (liveData) {
            const nextSignature = getPayloadSignature(liveData);

            if (nextSignature !== state.lastPayloadSignature) {
              renderSign(liveData, { preserveTimers: true });
            }
          }
        } catch (error) {
          console.error('Live 4D signage refresh failed:', error);
        }

        scheduleLiveRefresh();
      }, DATA_REFRESH_MS);
    }

    function renderSign(data, options = {}) {

      if (!options.preserveTimers) {
        clearTimers();
      }

      state.lastPayloadSignature = getPayloadSignature(data);
      state.schedule = data;

      renderPoster(data);
      renderAccessibility(data);
      renderAdvisory(data, options);
      renderShowtimes(data);

      if (!ui.signLayout.classList.contains('is-ended') && options.preserveTimers) {
        restartSupplementalTimers(data);
      }

      if (!options.preserveTimers) {
        scheduleTestimonialInterrupt(data);
      }

      scheduleShowtimeBoundaryRefresh();
      scheduleLiveRefresh();

      showSign();
    }

    async function fetchLiveSchedule() {
      const { data, error } = await supabaseClient
        .from('live_4d_signage_today')
        .select('*')
        .maybeSingle();

      if (error) {
        throw error;
      }

      return data;
    }

    async function initialize() {
      showStatus(LOADING_LABEL);

      try {
        if (USE_PLACEHOLDER_DATA) {
          renderSign(PLACEHOLDER_DATA);
          return;
        }

        const liveData = await fetchLiveSchedule();

        if (!liveData) {
          showStatus(UNAVAILABLE_LABEL);
          scheduleDataRefresh();
          return;
        }

        renderSign(liveData);

      } catch (error) {
        console.error('Failed to load live 4D signage data:', error);

        showStatus(FALLBACK_ERROR_LABEL);
        scheduleDataRefresh();
      }
    }

    ui.posterImage.addEventListener('error', () => {
      ui.posterImage.style.display = 'none';
      ui.posterFallback.style.display = 'flex';
    });

    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
