<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1152, initial-scale=0.6667, minimum-scale=0.6667, maximum-scale=0.6667, user-scalable=no" />
  <title>VAQ Next Programs</title>

  <!--
    Target container: 1152 x 810 px
    Scale fix applied for Kuusoft environment rendering oversized.
    Reuses Supabase schedule logic from the full Program Schedule signage.
    This focused module now displays only upcoming next programs.
    Up to 3 upcoming programs may be shown at once.
    If multiple programs share the same next start time, they are grouped first.
    A next-program designation persists until 5 minutes after that program's start time.
  -->

  <style>
    @font-face {
      font-display: swap;
      font-family: 'BlissPro';
      font-style: normal;
      font-weight: 700;
      src:
        url('../assets/BlissPro-Bold.woff2') format('woff2'),
        url('../assets/BlissPro-Bold.woff') format('woff');
    }

    @font-face {
      font-display: swap;
      font-family: 'BlissPro';
      font-style: italic;
      font-weight: 400;
      src:
        url('../assets/BlissPro-Italic.woff2') format('woff2'),
        url('../assets/BlissPro-Italic.woff') format('woff');
    }

    :root {
      --page-width: 1152px;
      --page-height: 810px;

      --page-fallback: #113466;
      --section-label-color: #f3bc43;
      --title-default: rgba(255,255,255,0.98);
      --meta-color: rgba(255,255,255,0.96);

      --next-stroke: #ead79f;
      --divider-color: rgba(0,0,0,0.14);

      --tile-fill-left: rgba(10, 58, 108, 0.92);
      --tile-fill-right: rgba(24, 73, 145, 0.92);
      --tile-shadow: 0 12px 24px rgba(0,0,0,0.18);

      --status-bg: rgba(0,0,0,0.22);
      --status-text: #ffffff;

      --anim-main: 420ms;
    }

    * { box-sizing: border-box; }

    html, body {
      width: var(--page-width);
      height: var(--page-height);
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--page-fallback);

      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      position: relative;
      font-family: 'BlissPro', Arial, sans-serif;
      color: #fff;
    }

    .frame {
      position: relative;
      width: var(--page-width);
      height: var(--page-height);
      overflow: hidden;
      background: var(--page-fallback);
    }

    .bg-rotator {
      position: absolute;
      width: 5000px;
      height: 5000px;
      top: -3500px;
      left: -1924px;
      background-image: url('../assets/RotCircAnim_5000x5000.jpg');
      background-repeat: no-repeat;
      background-size: 5000px 5000px;
      transform-origin: center center;
      animation: slowRotateCCW 200s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    .content-layer {
      position: absolute;
      inset: 0;
      z-index: 2;

      /* Even margin all around */
      padding: 48px;
      
      display: flex;
      align-items: center;
      justify-content: center;      
    }

    .status-panel {
      position: absolute;
      inset: 40px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: var(--status-bg);
      color: var(--status-text);
      font-size: 38px;
      font-weight: 700;
      line-height: 1.15;
    }

    .status-panel[hidden],
    .module[hidden] {
      display: none !important;
    }

    .module {
      width: 100%;
      height: 100%;

      display: flex;
      flex-direction: column;
      justify-content: center;   /* vertical centering */
      align-items: center;       /* horizontal centering */

      gap: 24px;                 /* clean, even spacing between tiles */
    }

   .cards-list {
      display: flex;
      flex-direction: column;
      gap: 24px;

      width: 100%;
      align-items: center;  /* ensures tiles are centred */
    }

    .program-card {
      position: relative;
      width: 960px;
      min-height: 170px;
      border-radius: 22px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 212px 1fr;
      box-shadow:
        inset 0 0 0 13px var(--next-stroke),
        var(--tile-shadow);
    }

    .program-card.entering {
      opacity: 0;
      transform: translateY(12px);
    }

    .program-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(0,0,0,0.18) 0%,
          rgba(0,0,0,0.08) 18%,
          rgba(0,0,0,0.00) 42%
        );
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .program-icon {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px 18px;
      border-right: 2px solid var(--divider-color);
    }

    .program-icon img {
      display: block;
      width: auto;
      max-width: 150px;
      max-height: 150px;
      transform: scale(1.06);
      transform-origin: center center;
      filter: drop-shadow(0 0 12px rgba(0,0,0,0.14));
    }

    .program-content {
      position: relative;
      z-index: 2;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 22px 34px 26px 26px;
    }

    .program-title {
      margin: 0 0 10px 0;
      font-size: 44px;
      line-height: 1.14;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      color: var(--title-default);
      padding-bottom: 4px;
    }

    .program-meta {
      font-size: 36px;
      line-height: 1.14;
      font-style: italic;
      font-weight: 400;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      color: var(--meta-color);
      padding-bottom: 4px;
    }

    @keyframes slowRotateCCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="bg-rotator" aria-hidden="true"></div>

    <div class="content-layer">
      <div id="status-panel" class="status-panel" hidden></div>

      <section id="module" class="module" hidden>
        <div id="cards-list" class="cards-list"></div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://csxuuwbtxgdpvskggcux.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_jPeweysUr7DZvFxG7F1-LQ_UR8MT1F9';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const TIMEZONE_NAME = 'America/Vancouver';
    const BOUNDARY_FUDGE_MS = 250;
    const MAX_NEXT_PROGRAMS = 3;
    const NEXT_PROGRAM_GRACE_MINUTES = 5;

    const state = {
      allEntries: [],
      renderedSignature: '',
      refreshTimerId: null
    };

    const statusPanel = document.getElementById('status-panel');
    const moduleEl = document.getElementById('module');
    const cardsList = document.getElementById('cards-list');

    function clearRefreshTimer() {
      if (state.refreshTimerId) {
        clearTimeout(state.refreshTimerId);
        state.refreshTimerId = null;
      }
    }

    function normalizeHexColor(hex) {
      return /^#[0-9a-fA-F]{6}$/.test(hex || '') ? hex : '#446688';
    }

    function hexToRgba(hex, alpha) {
      const safeHex = normalizeHexColor(hex);
      const r = parseInt(safeHex.slice(1, 3), 16);
      const g = parseInt(safeHex.slice(3, 5), 16);
      const b = parseInt(safeHex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function showStatus(message) {
      clearRefreshTimer();
      statusPanel.hidden = false;
      statusPanel.textContent = message;
      moduleEl.hidden = true;
    }

    function showModule() {
      statusPanel.hidden = true;
      moduleEl.hidden = false;
    }

    function getCurrentVancouverParts() {
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: TIMEZONE_NAME,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });

      const parts = formatter.formatToParts(new Date());
      const get = type => parts.find(part => part.type === type)?.value ?? '00';

      return {
        year: +get('year'),
        month: +get('month'),
        day: +get('day'),
        hour: +get('hour'),
        minute: +get('minute'),
        second: +get('second')
      };
    }

    function getCurrentMinutesInVancouver() {
      const p = getCurrentVancouverParts();
      return (p.hour * 60) + p.minute;
    }

    function getMillisecondsUntilVancouverMinute(targetMinutes) {
      const now = getCurrentVancouverParts();
      const currentMinutes = (now.hour * 60) + now.minute;

      let delta = targetMinutes - currentMinutes;
      if (delta < 0) delta += 1440;

      const msRemaining = (60 - now.second) * 1000;

      return delta === 0
        ? msRemaining
        : msRemaining + ((delta - 1) * 60000);
    }

    function parseTimeToMinutes(value) {
      if (!/^\d{2}:\d{2}$/.test(value || '')) return null;
      const [hours, minutes] = value.split(':').map(Number);
      return (hours * 60) + minutes;
    }

    function formatTime12Hour(value) {
      if (!value) return '';
      const [hours, minutes] = value.split(':').map(Number);
      const suffix = hours >= 12 ? 'p.m.' : 'a.m.';
      const hour12 = hours % 12 || 12;
      return `${hour12}:${String(minutes).padStart(2, '0')} ${suffix}`;
    }

    function buildMetaLine(entry) {
      return `${formatTime12Hour(entry.start_time)} @ ${entry.location_name}`;
    }

    /*
      Next-program logic for this focused signage mode:
      1) A program remains eligible until 5 minutes after its start time.
      2) Find the earliest eligible start time.
      3) Include all programs at that start time first.
      4) If fewer than MAX_NEXT_PROGRAMS are found, fill remaining slots
         with later eligible programs in chronological order.
    */
    function resolveNextPrograms(entries, nowMinutes) {
      const eligibleEntries = entries.filter(entry =>
        Number.isInteger(entry.start_minutes) &&
        nowMinutes <= (entry.start_minutes + NEXT_PROGRAM_GRACE_MINUTES)
      );

      if (!eligibleEntries.length) return [];

      const firstStart = eligibleEntries[0].start_minutes;
      const sameStartEntries = eligibleEntries.filter(entry => entry.start_minutes === firstStart);
      const laterEntries = eligibleEntries.filter(entry => entry.start_minutes > firstStart);

      return [...sameStartEntries, ...laterEntries].slice(0, MAX_NEXT_PROGRAMS);
    }

    function getNextBoundaryMinutes(entries, nowMinutes) {
      return entries
        .flatMap(entry => [
          entry.start_minutes,
          Number.isInteger(entry.start_minutes) ? entry.start_minutes + NEXT_PROGRAM_GRACE_MINUTES : null,
          entry.end_minutes
        ])
        .filter(minutes => Number.isInteger(minutes) && minutes > nowMinutes)
        .sort((a, b) => a - b)[0] ?? null;
    }

    function createCard(entry) {
      const card = document.createElement('article');
      card.className = 'program-card entering';
      card.style.background = hexToRgba(entry.hex_color, 0.80);

      const icon = document.createElement('div');
      icon.className = 'program-icon';

      const img = document.createElement('img');
      img.src = entry.icon_path;
      img.alt = `${entry.location_name} icon`;

      icon.appendChild(img);

      const content = document.createElement('div');
      content.className = 'program-content';

      const title = document.createElement('div');
      title.className = 'program-title';
      title.textContent = entry.title || '';

      const meta = document.createElement('div');
      meta.className = 'program-meta';
      meta.textContent = buildMetaLine(entry);

      content.append(title, meta);
      card.append(icon, content);

      return card;
    }

    function renderNextPrograms(nextPrograms) {
      const signature = nextPrograms.map(entry => entry.id).join('|');
      if (signature === state.renderedSignature) {
        showModule();
        return;
      }

      cardsList.innerHTML = '';

      nextPrograms.forEach(entry => {
        const card = createCard(entry);
        cardsList.appendChild(card);

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            card.classList.remove('entering');
          });
        });
      });

      state.renderedSignature = signature;
      showModule();
    }

    function scheduleBoundaryRefresh() {
      clearRefreshTimer();
      const nowMinutes = getCurrentMinutesInVancouver();
      const nextBoundary = getNextBoundaryMinutes(state.allEntries, nowMinutes);
      if (nextBoundary === null) return;

      const waitMs = getMillisecondsUntilVancouverMinute(nextBoundary) + BOUNDARY_FUDGE_MS;
      state.refreshTimerId = setTimeout(refreshProgramsFromCache, waitMs);
    }

    function refreshProgramsFromCache() {
      const nowMinutes = getCurrentMinutesInVancouver();
      const nextPrograms = resolveNextPrograms(state.allEntries, nowMinutes);

      if (!nextPrograms.length) {
        return showStatus('No upcoming programs scheduled today');
      }

      renderNextPrograms(nextPrograms);
      scheduleBoundaryRefresh();
    }

    async function initialize() {
      showStatus('Loading program schedule...');

      const today = new Intl.DateTimeFormat('en-CA', { timeZone: TIMEZONE_NAME }).format(new Date());

      const [locationResponse, scheduleResponse] = await Promise.all([
        supabaseClient
          .from('program_location_styles')
          .select('*')
          .eq('is_active', true),
        supabaseClient
          .from('program_schedule_sets')
          .select('*')
          .eq('schedule_date', today)
          .eq('mode', 'live')
          .maybeSingle()
      ]);

      if (locationResponse.error || scheduleResponse.error || !scheduleResponse.data) {
        return showStatus('Schedule unavailable');
      }

      const locationMap = Object.fromEntries(
        locationResponse.data.map(location => [location.location_key, location])
      );

      state.allEntries = (scheduleResponse.data.entries_json || [])
        .filter(entry => !entry.is_cancelled)
        .map(entry => ({
          ...entry,
          start_minutes: parseTimeToMinutes(entry.start_time),
          end_minutes: parseTimeToMinutes(entry.end_time),
          location_name: locationMap[entry.location_key]?.display_name || entry.location_key,
          hex_color: locationMap[entry.location_key]?.hex_color || '#446688',
          icon_path: `../gs-1-2_daily-program-schedule/program-schedule-full/assets/icons/${entry.location_key}.svg`
        }))
        .sort((a, b) => {
          if (a.start_minutes !== b.start_minutes) return a.start_minutes - b.start_minutes;
          if (a.end_minutes !== b.end_minutes) return a.end_minutes - b.end_minutes;
          return (a.title || '').localeCompare(b.title || '');
        });

      if (!state.allEntries.length) {
        return showStatus('No programs scheduled today');
      }

      refreshProgramsFromCache();
    }

    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
